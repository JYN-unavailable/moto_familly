# DHCP pour le réseau MotoFamily
interface=wlan0
bind-interfaces

# Plage IP : 192.168.50.10 → 192.168.50.50 (max 6 satellites + marge)
dhcp-range=192.168.50.10,192.168.50.50,255.255.255.0,12h

# Nom de domaine local
domain=motofamily.local
address=/host.motofamily.local/192.168.50.1

# DNS : utiliser 8.8.8.8 si internet disponible, sinon répondre localement
server=8.8.8.8
bogus-priv
no-resolv

# Log des attributions DHCP
log-dhcp
