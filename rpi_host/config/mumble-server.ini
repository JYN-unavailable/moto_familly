# ── Serveur Mumble — MotoFamily ───────────────────────────────────────────────
# Optimisé basse latence pour communication moto en temps réel

[Murmur]

# Écoute sur toutes les interfaces (dont wlan0)
host=0.0.0.0
port=64738

# Pas de mot de passe — accès contrôlé par tokens générés à l'appairage
serverpassword=

# Nom de la session visible dans l'app
registerName=MotoFamily

# Limite à 6 participants
users=6

# ── Audio basse latence ───────────────────────────────────────────────────────
# Tampon jitter minimal (en ms) — réduit la latence
jitterbuffer=0

# Opus pour tous (meilleure qualité/latence, compatible Linux)
opusthreshold=0

# Débit audio par défaut (bits/s) — 40kbps bon compromis qualité/bande passante
defaultchan=0

# ── Sécurité ─────────────────────────────────────────────────────────────────
# Tokens d'accès : chaque satellite reçoit son token à l'appairage
# Le token est utilisé comme mot de passe de canal ou via ACL

# Autoriser les connexions sans certificat (satellites n'ont pas de cert)
allowping=true
certrequired=false

# ── Logs ─────────────────────────────────────────────────────────────────────
logfile=/var/log/mumble-server/mumble-server.log
uname=mumble-server

# Base de données
database=/var/lib/mumble-server/mumble-server.sqlite

# ── Réseau ───────────────────────────────────────────────────────────────────
# Timeout connexion inactif (secondes)
timeout=30
bandwidth=72000
