# Point d'accès Wi-Fi MotoFamily
interface=wlan0
driver=nl80211

ssid=MotoFamily
wpa_passphrase=MotoFamily2024

# 2.4 GHz — meilleure portée pour usage moto
hw_mode=g
channel=6

# WPA2
wpa=2
wpa_key_mgmt=WPA-PSK
wpa_pairwise=TKIP
rsn_pairwise=CCMP
auth_algs=1

# QoS audio (réduction latence)
wmm_enabled=1
